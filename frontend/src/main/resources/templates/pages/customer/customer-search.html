<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Analytics</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-[Inter] min-h-screen py-16 px-4 sm:px-6 lg:px-8">

<div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-16">
        <div class="inline-flex items-center gap-3 bg-white rounded-2xl px-6 py-4 shadow-lg mb-6">
            <div class="w-14 h-14 bg-gradient-to-r from-blue-600 to-blue-700 rounded-xl flex items-center justify-center shadow-lg">
                <i class="fa fa-chart-line text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900">Customer Analytics</h1>
        </div>
        <p class="text-lg text-gray-600">Enter customer ID to view analytics</p>
    </div>

    <!-- Search Form -->
    <div class="bg-white rounded-2xl shadow-xl p-8 lg:p-12">
        <div class="space-y-6">

            <!-- Input -->
            <div class="relative">
                <div class="absolute left-4 top-1/2 -translate-y-1/2">
                    <i class="fa fa-hashtag text-gray-400"></i>
                </div>
                <input
                        id="customerId"
                        type="number"
                        placeholder="Enter Customer ID"
                        class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-xl text-lg font-semibold text-gray-900 placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/25 transition-all"
                        maxlength="8"
                />
            </div>

            <!-- Button -->
            <button
                    onclick="fetchAnalytics()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 px-6 rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transition-all duration-200 flex items-center justify-center gap-2"
            >
                <i class="fa fa-search"></i>
                Fetch Analytics
            </button>

            <!-- Error -->
            <div id="error" class="hidden bg-red-50 border border-red-200 rounded-xl p-4">
                <div class="flex items-center gap-2 text-sm text-red-800">
                    <i class="fa fa-exclamation-triangle"></i>
                    Enter valid Customer ID
                </div>
            </div>
        </div>
    </div>

</div>

<!-- JS -->
<script th:src="@{/js/customer/customer-search.js}" defer></script>

</body>
</html>

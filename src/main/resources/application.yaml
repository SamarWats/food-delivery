server:
  port: 8080

spring:
  application:
    name: delivery
  datasource:
    url: jdbc:mysql://database_uri:port/database_name?createDatabaseIfNotExist=true
    username: database_username
    password: database_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
